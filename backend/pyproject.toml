[project]
name = "interactive-beets"
description = "An opinionated web-interface around the music organizer [beets](https://beets.io/)"
version = "0.2.0"
dependencies = [
    "quart == 0.19.6",
    "quart_cors==0.7.0",
    "uvicorn[standard]==0.30.6",
    "rq==1.16.2",
]
requires-python = ">= 3.10"
readme = "../README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Web Environment",
]

[project.optional-dependencies]
test = ["pytest==8.2.2", "pytest-asyncio==0.23.8", "pytest-cov==5.0.0"]
dev = ["ruff>=0.6.5", "pre-commit>=3.8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
package = "interactive_beets"

[tool.ruff]
exclude = ["*tests*"]
include = ["pyproject.toml", "interactive_beets/**/*.py"]

[tool.ruff.lint]
select = [
    "I",
    "D",
    # Augment the convention by requiring an imperative mood for all docstrings.
    "D401",
    # Unused imports
    "F401",
]
ignore = ["D103"]
fixable = ["ALL"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"


[tool.pytest.ini_options]
addopts = ["--import-mode=importlib", "--cov=interactive_beets"]
filterwarnings = [
    "error",
    "ignore::sqlalchemy.exc.SAWarning",
    "ignore::DeprecationWarning",
]

[tool.coverage.report]
omit = ["*/tests/*"]

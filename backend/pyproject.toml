[project]
name = "interactive-beets"
description = "An opinionated web-interface around the music organizer [beets](https://beets.io/)"
version = "0.2.0"
dependencies = [
    "quart == 0.19.6",
    "quart_cors==0.7.0",
    "uvicorn[standard]==0.30.6",
]
requires-python = ">= 3.10"
readme = "../README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Web Environment",
]

[project.optional-dependencies]
test = ["pytest==8.2.2", "pytest-asyncio==0.23.8", "pytest-dependency==0.6.0"]
dev = ["isort==5.13.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
package = "interactive_beets"

[tool.isort]
profile = "black"
known_first_party = "interactive_beets"
src_paths = ["isort", "test"]
skip = ["../.gitignore", "../.dockerignore"]

[tool.pytest.ini_options]
addopts = ["--import-mode=importlib"]
filterwarnings = ["error", "ignore::sqlalchemy.exc.SAWarning"]
